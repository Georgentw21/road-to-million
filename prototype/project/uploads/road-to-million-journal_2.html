/* ============================================================ MONTHLY / YEARLY REPORT VIEW */
function yearsData(){
  const c=closed();const m={};
  for(const t of c){const yr=ymOf(tradeDate(t)).split('-')[0];const mo=ymOf(tradeDate(t)).split('-')[1];
    if(!m[yr])m[yr]={key:yr,total:0,wins:0,losses:0,be:0,r:0,net:0,months:{}};
    const o=m[yr];o.total++;o.net+=t.pnl||0;const oc=outcome(t);if(oc==='win')o.wins++;else if(oc==='loss')o.losses++;else o.be++;const r=calcR(t);if(r!=null)o.r+=r;
    o.months[mo]=o.months[mo]||{n:0,net:0,wins:0,losses:0};o.months[mo].n++;o.months[mo].net+=t.pnl||0;if(oc==='win')o.months[mo].wins++;else if(oc==='loss')o.months[mo].losses++;}
  return Object.values(m).map(o=>({...o,wr:(o.wins+o.losses)?o.wins/(o.wins+o.losses)*100:0})).sort((a,b)=>a.key<b.key?1:-1);
}
function viewReport(){
  const months=monthsData();
  const asc=[...months].sort((a,b)=>a.key<b.key?-1:1);
  const years=yearsData();
  const yAsc=[...years].sort((a,b)=>a.key<b.key?-1:1).map(y=>({net:y.net,label:y.key}));
  const toggle=`<div class="seg rseg"><button class="${reportMode==='month'?'on':''}" data-rmode="month">Monthly</button><button class="${reportMode==='year'?'on':''}" data-rmode="year">Yearly</button></div>`;
  if(reportMode==='year'){
    return `<div class="view">
      <div class="view-head"><div><div class="eyebrow">${esc(activePF==='all'?'All portfolios':pfName(activePF))}</div><h2>Yearly Report</h2><p>Year-by-year performance. Tap a year to expand its months.</p></div>${toggle}</div>
      <div class="row2">
        <div class="card panel"><div class="ph"><h3>Net P&amp;L per year</h3><span class="hint">growth</span></div>${monthlyBarsSVG(yAsc)}</div>
        <div class="card panel"><div class="ph"><h3>Cumulative growth</h3><span class="hint">running total</span></div>${cumLineSVG(yAsc)}</div>
      </div>
      <div class="ph" style="margin:18px 2px 12px"><h3 style="font-family:var(--display);font-size:18px">Years</h3></div>
      ${years.length?`<div class="mreport">${years.map(yearCardHTML).join('')}</div>`:`<div class="card empty" style="padding:44px"><p>No closed trades yet for this scope.</p></div>`}
    </div>`;
  }
  return `<div class="view">
    <div class="view-head"><div><div class="eyebrow">${esc(activePF==='all'?'All portfolios':pfName(activePF))}</div><h2>Monthly Report</h2><p>Per-month totals. Tap a month to see its trades, or open it in the calendar.</p></div>${toggle}</div>
    <div class="row2">
      <div class="card panel"><div class="ph"><h3>Monthly net P&amp;L</h3><span class="hint">growth per month</span></div>${monthlyBarsSVG(asc)}</div>
      <div class="card panel"><div class="ph"><h3>Cumulative growth</h3><span class="hint">running total</span></div>${cumLineSVG(asc)}</div>
    </div>
    <div class="card panel" style="margin:18px 0"><div class="ph"><h3>Portfolio performance</h3><span class="hint">profit / loss by account</span></div>
      <div class="pf-cards">${portfolioRows().map(r=>`<div class="pf-card"><div class="nm">${esc(r.p.name)}<span class="${r.net>=0?'pos':'neg'}" style="font-family:var(--mono);font-size:13px">${r.net>=0?'+':''}${moneyFor(r.p.id,r.net)}</span></div><div class="bk">${esc(r.p.broker||'—')}</div><div class="eq">${moneyFor(r.p.id,r.equity)}</div><div class="sub">${r.n} trades · ${r.wr.toFixed(0)}% win</div></div>`).join('')||'<p style="color:var(--faint);font-size:13px">No portfolios.</p>'}</div></div>
    <div class="ph" style="margin:6px 2px 12px"><h3 style="font-family:var(--display);font-size:18px">Months</h3></div>
    ${months.length?`<div class="mreport">${months.map(monthCardHTML).join('')}</div>`:`<div class="card empty" style="padding:44px"><p>No closed trades yet for this scope.</p></div>`}
  </div>`;
}
function yearCardHTML(y){
  const opened=expandedYear===y.key;
  const moRows=[];for(let i=1;i<=12;i++){const mo=String(i).padStart(2,'0');const d=y.months[mo];if(d)moRows.push({mo,...d,wr:(d.wins+d.losses)?d.wins/(d.wins+d.losses)*100:0});}
  const maxAbs=Math.max(1,...moRows.map(r=>Math.abs(r.net)));
  return `<div class="mcard ${opened?'open':''}">
    <div class="mtop" data-ytoggle="${y.key}">
      <div class="mname">${y.key}</div>
      <div><div class="mk">Total trades</div><div class="mv">${y.total}</div></div>
      <div><div class="mk">Win rate</div><div class="mv ${y.wr>=50?'pos':'neg'}">${y.wr.toFixed(0)}%</div></div>
      <div><div class="mk">Total RRR</div><div class="mv">${(y.r>=0?'+':'')+y.r.toFixed(1)}R</div></div>
      <div><div class="mk">Net P&amp;L</div><div class="mv ${y.net>=0?'pos':'neg'}">${fmtMoney(y.net)}</div></div>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="mbody"><div style="padding:14px 22px"><div class="bd">${moRows.map(r=>`<div class="row" data-opencal="${y.key}-${r.mo}" style="cursor:pointer"><div class="name">${MONTH_NAMES[+r.mo-1]} <small>${r.n}t · ${r.wr.toFixed(0)}% wr</small></div><div class="val ${r.net>=0?'pos':'neg'}">${fmtMoney(r.net)}</div><div class="track"><div class="fill" style="width:${Math.abs(r.net)/maxAbs*100}%;background:${r.net>=0?'var(--green)':'var(--red)'}"></div></div></div>`).join('')||'<p style="color:var(--faint);font-size:13px">No trades.</p>'}</div></div></div>
  </div>`;
}
function monthCardHTML(m){
  const opened=expandedMonth===m.key;
  const rows=[...m.trades].sort((a,b)=>new Date(tradeDate(b))-new Date(tradeDate(a)));
  return `<div class="mcard ${opened?'open':''}">
    <div class="mtop" data-mtoggle="${m.key}">
      <div class="mname">${esc(m.label)}</div>
      <div><div class="mk">Total trades</div><div class="mv">${m.total}</div></div>
      <div><div class="mk">Win rate</div><div class="mv ${m.wr>=50?'pos':'neg'}">${m.wr.toFixed(0)}%</div></div>
      <div><div class="mk">Total RRR</div><div class="mv">${(m.r>=0?'+':'')+m.r.toFixed(1)}R</div></div>
      <div><div class="mk">Net P&amp;L</div><div class="mv ${m.net>=0?'pos':'neg'}">${fmtMoney(m.net)}</div></div>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="mbody">
      <div style="padding:10px 22px"><button class="mini gold" data-opencal="${m.key}">Open in calendar →</button> <button class="mini" data-expmonth="${m.key}">Export to Word</button> <span style="color:var(--faint);font-size:12px;margin-left:8px">${m.wins}W · ${m.losses}L · ${m.be}BE</span></div>
      <div class="tbl-wrap" style="border:none;border-radius:0;border-top:1px solid var(--line)"><table style="min-width:640px"><thead><tr><th>Date (ICT)</th><th>Symbol</th><th>Side</th><th>Setup</th><th>P&amp;L</th><th>R</th><th></th></tr></thead><tbody>
        ${rows.map(t=>{const r=calcR(t);return `<tr data-open="${t.id}"><td style="color:var(--dim)">${fmtDateShort(tradeDate(t))}</td><td style="font-weight:600">${esc(t.symbol)}</td><td><span class="pill ${t.dir==='buy'?'tag buy':'tag sell'}" style="display:inline-block">${(t.dir||'').toUpperCase()}</span></td><td class="strat">${esc(t.strategy||'—')}</td><td class="mono ${t.pnl>=0?'pos':'neg'}">${fmtMoney(t.pnl||0)}</td><td class="mono" style="color:var(--dim)">${r!=null?fmtR(r):'—'}</td><td><button class="mini edit-trade" data-edit="${t.id}">Edit</button></td></tr>`;}).join('')}
      </tbody></table></div>
    </div></div>`;
}

/* ============================================================ EDIT FLOW */
function newTrade(){editingId=null;draft={dir:'buy',conf:3,mistakes:[],images:[]};go('add');}
async function startEdit(id){
  const t=TRADES.find(x=>x.id===id);if(!t)return;closeModal();editingId=id;
  draft={dir:t.dir||'buy',conf:t.conf||3,mistakes:[...(t.mistakes||[])],plan:t.plan,portfolioId:t.portfolioId,
    symbol:t.symbol,strategy:t.strategy,tf:t.tf,session:t.session,entry:t.entry,stop:t.stop,tp:t.tp,lot:t.lot,
    risk:t.risk,fees:t.fees,exit:t.exit,pnl:(t.pnl!=null?t.pnl:''),status:t.status,notes:t.notes,result:t.result||'',
    dateVal:bkkInputValue(new Date(t.entryAt)),closeVal:t.exitAt?bkkInputValue(new Date(t.exitAt)):'',images:[]};
  const keys=tradeImgKeys(t);
  for(const k of keys){try{const d=await Store.get(k);if(d)draft.images.push(d);}catch(e){}}
  go('add');
}

/* ============================================================ CALENDAR / REPORT BINDINGS */
function bindCalendar(){
  document.querySelectorAll('[data-cal]').forEach(b=>b.onclick=()=>{let{y,m}=calCursor;const a=b.dataset.cal;
    if(a==='prev'){m--;if(m<0){m=11;y--;}}else if(a==='next'){m++;if(m>11){m=0;y++;}}else{const tp=bkkParts(new Date());y=+tp.year;m=+tp.month-1;}
    calCursor={y,m};render();});
  // drag to reschedule
  document.querySelectorAll('.cal-card[data-drag]').forEach(card=>{
    card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',card.dataset.drag);e.dataTransfer.effectAllowed='move';card.classList.add('dragging');});
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  });
  document.querySelectorAll('.cal-cell[data-date]').forEach(cell=>{
    cell.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';cell.classList.add('drop-hover');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drop-hover'));
    cell.addEventListener('drop',async e=>{
      e.preventDefault();cell.classList.remove('drop-hover');
      const id=e.dataTransfer.getData('text/plain');const t=TRADES.find(x=>x.id===id);if(!t)return;
      const posDay=dayKeyOf(tradeDate(t));
      if(posDay===cell.dataset.date)return;
      const delta=daysBetween(posDay,cell.dataset.date);
      shiftTradeByDays(t,delta);await persistTrades();render();
      const[,mm,dd]=cell.dataset.date.split('-');
      toast(t.symbol+' moved to '+MONTH_ABBR[+mm-1]+' '+(+dd));
    });
  });
  // export to Word menu
  const expBtn=$('#exp-btn');if(expBtn)expBtn.onclick=e=>{e.stopPropagation();$('#exp-menu').classList.toggle('open');};
  const scopeLbl=activePF==='all'?'All portfolios':pfName(activePF);
  document.querySelectorAll('[data-expmonthcal]').forEach(b=>b.onclick=()=>{const{y,m}=calCursor;const ymStr=`${y}-${String(m+1).padStart(2,'0')}`;const arr=pfTrades().filter(t=>ymOf(tradeDate(t))===ymStr);$('#exp-menu').classList.remove('open');exportWord(arr,(BRAND.name||'Road To Million')+' — Monthly Review · '+MONTH_NAMES[m]+' '+y,scopeLbl+' · '+(CURRENT_NAME||CURRENT_EMAIL||''));});
  document.querySelectorAll('[data-expweek]').forEach(b=>b.onclick=()=>{const wk=b.dataset.expweek;const yr=wk.split(':')[1].split('-')[0];const num=wk.split('-')[1];const arr=pfTrades().filter(t=>weekKey(new Date(tradeDate(t)))===wk);$('#exp-menu').classList.remove('open');exportWord(arr,(BRAND.name||'Road To Million')+' — Weekly Review · Week '+num+', '+yr,scopeLbl+' · '+(CURRENT_NAME||CURRENT_EMAIL||''));});
}
function bindReport(){
  document.querySelectorAll('[data-rmode]').forEach(b=>b.onclick=()=>{reportMode=b.dataset.rmode;render();});
  document.querySelectorAll('[data-mtoggle]').forEach(el=>el.onclick=()=>{const k=el.dataset.mtoggle;expandedMonth=expandedMonth===k?null:k;render();});
  document.querySelectorAll('[data-ytoggle]').forEach(el=>el.onclick=()=>{const k=el.dataset.ytoggle;expandedYear=expandedYear===k?null:k;render();});
  document.querySelectorAll('[data-opencal]').forEach(b=>b.onclick=e=>{e.stopPropagation();const[y,mm]=b.dataset.opencal.split('-');calCursor={y:+y,m:+mm-1};go('calendar');});
  document.querySelectorAll('[data-expmonth]').forEach(b=>b.onclick=e=>{e.stopPropagation();const k=b.dataset.expmonth;const arr=closed().filter(t=>ymOf(tradeDate(t))===k);exportWord(arr,(BRAND.name||'Road To Million')+' — Monthly Review · '+monthLabel(k),(activePF==='all'?'All portfolios':pfName(activePF))+' · '+(CURRENT_NAME||CURRENT_EMAIL||''));});
}


function go(v){currentView=v;editingHead=false;todoEditKind=null;editingAff=false;affOverride=null;tradeLimit=200;document.querySelectorAll('.nav button[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));render();window.scrollTo(0,0);const m=document.querySelector('.main');if(m)m.scrollTop=0;}
document.querySelectorAll('.nav button[data-view]').forEach(b=>b.onclick=()=>{b.dataset.view==='add'?newTrade():go(b.dataset.view);});
$('#settings-btn').onclick=()=>{currentView='settings';document.querySelectorAll('.nav button[data-view]').forEach(b=>b.classList.remove('active'));render();};
$('#lock-btn').onclick=()=>{if(confirm('Sign out of '+(CURRENT_NAME||CURRENT_EMAIL||'this account')+'? Your data stays saved on this device.'))signOut();};

/* portfolio switcher */
function renderPFSwitch(){
  const cur=activePF==='all'?{name:'All portfolios',broker:''}:(activePFobj()||{name:'—',broker:''});
  $('#pf-name').textContent=cur.name;$('#pf-broker').textContent=cur.broker||'';
  $('#pf-menu').innerHTML=`<button data-pf="all" class="${activePF==='all'?'on':''}">All portfolios<small>combined</small></button>`+
    PORTFOLIOS.map(p=>`<button data-pf="${p.id}" class="${activePF===p.id?'on':''}">${esc(p.name)}<small>${esc(p.broker||'')} · ${esc(p.symbol)}${(+p.startBalance).toLocaleString()}</small></button>`).join('');
  document.querySelectorAll('#pf-menu button').forEach(b=>b.onclick=()=>{activePF=b.dataset.pf;saveMeta();$('#pf-menu').classList.remove('open');renderPFSwitch();render();});
}
$('#pf-btn').onclick=e=>{e.stopPropagation();$('#pf-menu').classList.toggle('open');};
document.addEventListener('click',e=>{if(!e.target.closest('#pf-switch'))$('#pf-menu').classList.remove('open');const em=$('#exp-menu');if(em&&!e.target.closest('.exp-wrap'))em.classList.remove('open');});

/* ============================================================ AUTH (multi-account) */
let authMode='signin';
async function getAccounts(){try{const a=await Store.get(ACCT_KEY);return a?JSON.parse(a):{};}catch(e){return {};}}
async function saveAccounts(a){await Store.set(ACCT_KEY,JSON.stringify(a));}

async function bootGate(){
  await migrateLegacy();
  const accounts=await getAccounts();
  authMode=Object.keys(accounts).length?'signin':'signup';
  const last=await Store.get('rtm:last');
  if(last&&$('#g-email'))$('#g-email').value=last;
  applyAuthMode();
  ($('#g-email')||{focus(){}}).focus();
}
function applyAuthMode(){
  const signup=authMode==='signup';
  $('#gate-eyebrow').textContent=signup?'Create account':'Sign in';
  $('#gate-title').innerHTML=signup?'Join the <em>Road</em>':'Road To <em>Million</em>';
  $('#gate-sub').textContent=signup?'Set up your private journal in seconds.':'Welcome back. Sign in to your journal.';
  $('#gate-btn').textContent=signup?'Create account':'Sign in';
  $('#name-field').style.display=signup?'block':'none';
  $('#confirm-field').style.display=signup?'block':'none';
  $('#toggle-text').textContent=signup?'Already have an account?':'New here?';
  $('#gate-toggle').textContent=signup?'Sign in':'Create an account';
  $('#gate-err').textContent='';
}
function toggleAuth(){authMode=authMode==='signup'?'signin':'signup';applyAuthMode();($('#g-email').value?$('#g-pass'):$('#g-email')).focus();}

async function doAuth(){
  const err=$('#gate-err');err.textContent='';
  const email=($('#g-email').value||'').trim().toLowerCase();
  const pass=($('#g-pass').value||'').trim();
  if(!email||!/.+@.+\..+/.test(email)){err.textContent='Enter a valid email.';return;}
  if(pass.length<4){err.textContent='Password must be at least 4 characters.';return;}
  const accounts=await getAccounts();
  if(authMode==='signup'){
    const name=($('#g-name').value||'').trim();
    const conf=($('#g-confirm').value||'').trim();
    if(pass!==conf){err.textContent='Passwords do not match.';return;}
    if(accounts[email]){err.textContent='An account with this email already exists. Try signing in.';return;}
    const id=uid();
    accounts[email]={id,name:name||email.split('@')[0],hash:hash(pass),created:Date.now()};
    await saveAccounts(accounts);
    await Store.set('rtm:last',email);
    currentUser=id;CURRENT_EMAIL=email;CURRENT_NAME=accounts[email].name;
    await enterApp(true);
  } else {
    const acc=accounts[email];
    if(!acc||acc.hash!==hash(pass)){err.textContent='Incorrect email or password.';$('#g-pass').value='';$('#g-pass').focus();return;}
    await Store.set('rtm:last',email);
    currentUser=acc.id;CURRENT_EMAIL=email;CURRENT_NAME=acc.name;
    await enterApp(false);
  }
}

/* migrate a single legacy (v2) journal into a named account, once */
async function migrateLegacy(){
  const accounts=await getAccounts();
  if(Object.keys(accounts).length)return;
  let legacyPass=null;try{legacyPass=await Store.get('auth:passcode');}catch(e){}
  const legacyTrades=await Store.get('journal:trades');
  if(!legacyPass&&!legacyTrades)return;
  const id=uid(),email='legacy@local';
  accounts[email]={id,name:'My journal',hash:legacyPass||hash('0000'),created:Date.now()};
  await saveAccounts(accounts);
  const moves=[['journal:trades','trades'],['journal:portfolios','portfolios'],['journal:setups','setups'],['journal:playbook','playbook'],['journal:settings','settings']];
  for(const [oldK,suf] of moves){const v=await Store.get(oldK);if(v!=null)await Store.set('acct:'+id+':'+suf,v);}
}

function loadBrand(){ $('#brand-name').textContent=BRAND.name||'Road To Million'; document.title=(BRAND.name||'Road To Million')+' — Journal'; const an=$('#acct-name'); if(an)an.textContent=CURRENT_NAME||CURRENT_EMAIL||''; }
function saveMeta(){Store.set(ak('settings'),JSON.stringify({activePF,brandName:BRAND.name,tagline:BRAND.tagline,deskTitle:BRAND.deskTitle}));}

async function loadAll(){
  try{const s=await Store.get(ak('settings'));if(s){const o=JSON.parse(s);if(o.activePF)activePF=o.activePF;if(o.brandName)BRAND.name=o.brandName;if(o.tagline!=null)BRAND.tagline=o.tagline;if(o.deskTitle)BRAND.deskTitle=o.deskTitle;}}catch(e){}
  try{const p=await Store.get(ak('portfolios'));if(p)PORTFOLIOS=JSON.parse(p);}catch(e){}
  _shardCache={};_shardCount=0;TRADES=[];
  try{
    const idxRaw=await Store.get(ak('trades_index'));
    if(idxRaw){
      const idx=JSON.parse(idxRaw);
      for(let i=0;i<idx.shards;i++){const s=await Store.get(ak('trades_s'+i));if(s){TRADES.push(...(JSON.parse(s)||[]));_shardCache[i]=s;}}
      _shardCount=idx.shards;
    } else {
      const t=await Store.get(ak('trades'));TRADES=t?(JSON.parse(t)||[]):[];
      if(TRADES.length){await persistTrades();await Store.del(ak('trades'));} // migrate legacy single-key → shards
    }
  }catch(e){}
  try{const su=await Store.get(ak('setups'));if(su)SETUPS=JSON.parse(su);}catch(e){}
  try{const si=await Store.get(ak('setupinfo'));if(si)SETUP_INFO=JSON.parse(si);}catch(e){}
  try{const pb=await Store.get(ak('playbook'));if(pb){const o=JSON.parse(pb);PLAYBOOK={affirmations:o.affirmations||[],rules:o.rules||[],vision:o.vision||[],weekly:o.weekly||[],monthly:o.monthly||[],checks:o.checks||{},mistakeTags:o.mistakeTags||[]};}}catch(e){}
  if(!SETUPS||!SETUPS.length){SETUPS=[...DEFAULT_SETUPS];persistSetups();}
  if(!PLAYBOOK.affirmations.length&&!PLAYBOOK.rules.length&&!PLAYBOOK.vision.length){PLAYBOOK.affirmations=[...DEFAULT_AFFIRM];PLAYBOOK.rules=[...DEFAULT_RULES];}
  if(!PLAYBOOK.weekly||!PLAYBOOK.weekly.length){PLAYBOOK.weekly=[...DEFAULT_WEEKLY];}
  if(!PLAYBOOK.monthly||!PLAYBOOK.monthly.length){PLAYBOOK.monthly=[...DEFAULT_MONTHLY];}
  if(!PLAYBOOK.checks)PLAYBOOK.checks={};
  persistPlaybook();
  if(!PORTFOLIOS||!PORTFOLIOS.length){
    PORTFOLIOS=[{id:uid(),name:'Main',broker:'',startBalance:10000,currency:'USD',symbol:'$'}];
    persistPortfolios();
  }
  let changed=false;TRADES.forEach(t=>{if(!t.portfolioId){t.portfolioId=PORTFOLIOS[0].id;changed=true;}});if(changed)persistTrades();
  if(activePF!=='all'&&!PORTFOLIOS.find(p=>p.id===activePF))activePF='all';
}
async function enterApp(isNew){
  await loadAll();
  editingId=null;expandedMonth=null;
  const tp=bkkParts(new Date());calCursor={y:+tp.year,m:+tp.month-1};
  loadBrand();
  $('#gate').style.display='none';$('#app').classList.add('live');
  renderPFSwitch();tickClock();go('dashboard');
  if(isNew)setTimeout(()=>toast('Account created — your journal is ready'),300);
}
function signOut(){
  currentUser=null;CURRENT_EMAIL=null;CURRENT_NAME=null;
  TRADES=[];PORTFOLIOS=[];SETUPS=[];SETUP_INFO={};PLAYBOOK={affirmations:[],rules:[],vision:[],weekly:[],monthly:[],checks:{},mistakeTags:[]};
  activePF='all';BRAND={name:'Road To Million',tagline:DEFAULT_TAGLINE};
  $('#app').classList.remove('live');$('#g-pass').value='';
  authMode='signin';applyAuthMode();$('#gate').style.display='flex';$('#g-email').focus();
}
$('#gate-btn').onclick=doAuth;
$('#gate-toggle').onclick=toggleAuth;
['g-email','g-pass','g-confirm','g-name'].forEach(id=>{const el=$('#'+id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();$('#lightbox').classList.remove('open');}});
bootGate();
</script>
