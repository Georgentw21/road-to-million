<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Road To Million — Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0B0F; --bg2:#0E0E13; --surface:#16161C; --surface2:#1E1E26;
  --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.12);
  --text:#ECEAE3; --dim:#9A9AA4; --faint:#5E5E68;
  --gold:#C9A65F; --gold-2:#E2C588; --gold-soft:rgba(201,166,95,.10);
  --green:#5FC08D; --green-soft:rgba(95,192,141,.12);
  --red:#DC6A63; --red-soft:rgba(220,106,99,.12);
  --blue:#7BA7D9;
  --r:14px; --r-sm:10px;
  --shadow:0 18px 50px -20px rgba(0,0,0,.7);
  --display:"Fraunces",Georgia,serif;
  --ui:"Inter","Noto Sans Thai",system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(201,166,95,.06), transparent 60%),
    radial-gradient(900px 700px at -10% 110%, rgba(123,167,217,.05), transparent 55%),
    var(--bg);
  color:var(--text); font-family:var(--ui); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased; letter-spacing:.005em;
  min-height:100%; overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;color:inherit;font-size:14px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.pos{color:var(--green)} .neg{color:var(--red)}

/* ============ LOGIN ============ */
#gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1000px 700px at 50% 0%, rgba(201,166,95,.07), transparent 60%), var(--bg);padding:24px}
.gate-card{width:100%;max-width:380px;text-align:center;animation:rise .7s cubic-bezier(.2,.7,.2,1)}
.crest{width:54px;height:54px;margin:0 auto 22px;border:1px solid var(--line-2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:var(--gold-soft)}
.crest svg{width:24px;height:24px}
.gate-card .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.gate-card h1{font-family:var(--display);font-weight:500;font-size:32px;line-height:1.1;margin-bottom:8px}
.gate-card h1 em{font-style:italic;color:var(--gold-2)}
.gate-card p.sub{color:var(--dim);font-size:13.5px;margin-bottom:28px;line-height:1.55}
.field{position:relative;margin-bottom:14px;text-align:left}
.field label{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
.input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:13px 15px;color:var(--text);transition:border-color .2s,background .2s;outline:none}
.input:focus{border-color:var(--gold);background:#191920}
.input.code{text-align:center;letter-spacing:.5em;font-family:var(--mono);font-size:18px;padding-left:.5em}
.btn{width:100%;border:none;border-radius:var(--r-sm);padding:13px;font-weight:600;font-size:14px;
  background:linear-gradient(180deg,var(--gold-2),var(--gold));color:#1a1408;letter-spacing:.02em;
  transition:transform .12s,filter .2s;margin-top:6px}
.btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;border:1px solid var(--line-2);color:var(--text)}
.btn.ghost:hover{background:var(--surface);filter:none}
.gate-err{color:var(--red);font-size:13px;min-height:18px;margin-top:10px}
.gate-foot{margin-top:22px;font-size:11.5px;color:var(--faint);line-height:1.5}
.gate-foot a{color:var(--dim);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* ============ APP SHELL ============ */
#app{display:none;min-height:100vh}
#app.live{display:grid;grid-template-columns:230px 1fr}
.sidebar{border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;background:linear-gradient(180deg,var(--bg2),transparent)}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 22px}
.brand .mark{width:34px;height:34px;border-radius:9px;background:var(--gold-soft);border:1px solid var(--line-2);
  display:flex;align-items:center;justify-content:center}
.brand .mark svg{width:18px;height:18px}
.brand .name{font-family:var(--display);font-size:18px;font-weight:600;line-height:1}
.brand .name small{display:block;font-family:var(--ui);font-size:9.5px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--faint);margin-top:3px;font-weight:500}
.nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow:auto}
.nav button{display:flex;align-items:center;gap:12px;padding:10px 12px;border:none;background:none;
  border-radius:var(--r-sm);color:var(--dim);font-size:13.5px;font-weight:500;text-align:left;
  transition:background .15s,color .15s;width:100%}
.nav button svg{width:18px;height:18px;opacity:.8;flex-shrink:0}
.nav button:hover{background:var(--surface);color:var(--text)}
.nav button.active{background:var(--surface2);color:var(--text)}
.nav button.active svg{opacity:1;color:var(--gold)}
.nav .add{margin-top:6px;background:var(--gold-soft);color:var(--gold-2);border:1px solid rgba(201,166,95,.25)}
.nav .add:hover{background:rgba(201,166,95,.16)}
.nav .sechead{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);
  padding:14px 12px 5px;font-weight:600}
.side-foot{border-top:1px solid var(--line);padding-top:12px;margin-top:8px}
.side-foot button{font-size:12.5px;color:var(--faint);background:none;border:none;display:flex;
  align-items:center;gap:9px;padding:8px;width:100%;border-radius:8px}
.side-foot button:hover{color:var(--dim);background:var(--surface)}
.side-foot button svg{width:15px;height:15px}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:15px 30px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;
  background:rgba(11,11,15,.82);backdrop-filter:blur(14px)}
.topbar .clock{display:flex;align-items:baseline;gap:11px;min-width:0}
.topbar .clock .t{font-family:var(--mono);font-size:18px;font-weight:500;letter-spacing:.02em}
.topbar .clock .d{font-size:11.5px;color:var(--faint);white-space:nowrap}
.pf-switch{position:relative}
.pf-switch>button{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line-2);
  border-radius:99px;padding:8px 14px;font-size:13px;font-weight:500}
.pf-switch>button .bk{color:var(--faint);font-size:11.5px}
.pf-switch>button svg{width:13px;height:13px;color:var(--dim)}
.pf-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--surface2);border:1px solid var(--line-2);
  border-radius:var(--r-sm);padding:6px;min-width:230px;box-shadow:var(--shadow);z-index:30;display:none}
.pf-menu.open{display:block;animation:fade .2s}
.pf-menu button{display:flex;flex-direction:column;align-items:flex-start;gap:2px;width:100%;text-align:left;
  background:none;border:none;padding:9px 12px;border-radius:8px;font-size:13.5px;color:var(--text)}
.pf-menu button small{color:var(--faint);font-size:11px}
.pf-menu button:hover{background:var(--surface)}
.pf-menu button.on{background:var(--gold-soft);color:var(--gold-2)}
.sessions{display:flex;gap:7px;flex-wrap:wrap}
.sess{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;
  border:1px solid var(--line);font-size:11px;color:var(--dim);background:var(--surface)}
.sess .dot{width:6px;height:6px;border-radius:50%;background:var(--faint);transition:background .3s}
.sess.open{border-color:rgba(95,192,141,.3);color:var(--text)}
.sess.open .dot{background:var(--green);animation:pulse 2.2s infinite}
.live-badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--green)}
.live-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.2s infinite}

.view{padding:28px 30px;max-width:1180px;width:100%;margin:0 auto;animation:fade .4s ease}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.view-head .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.view-head h2{font-family:var(--display);font-weight:500;font-size:30px;line-height:1.05}
.view-head p{color:var(--dim);font-size:13.5px;margin-top:6px}

/* affirmation banner */
.affirm{display:flex;align-items:center;gap:16px;padding:16px 22px;border-radius:var(--r);margin-bottom:18px;
  background:linear-gradient(120deg,rgba(201,166,95,.12),rgba(201,166,95,.02));border:1px solid rgba(201,166,95,.22)}
.affirm .q{font-family:var(--display);font-style:italic;font-size:19px;line-height:1.4;color:var(--gold-2)}
.affirm .mk{font-size:30px;color:var(--gold);font-family:var(--display);line-height:.6}

.hero{display:grid;grid-template-columns:1.15fr 1fr;gap:18px;margin-bottom:18px}
.card{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--line);
  border-radius:var(--r);box-shadow:var(--shadow)}
.hero .equity{padding:26px 28px;display:flex;flex-direction:column}
.hero .equity .lbl{font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);
  display:flex;justify-content:space-between;align-items:center}
.hero .equity .big{font-family:var(--display);font-weight:600;font-size:50px;line-height:1;margin:14px 0 8px;
  font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.hero .equity .delta{font-family:var(--mono);font-size:14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.hero .equity .chartwrap{margin-top:auto;padding-top:18px}
.curve{width:100%;height:120px;display:block;overflow:visible}
.curve path.line{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat{padding:18px 20px;display:flex;flex-direction:column;justify-content:center}
.stat .k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
.stat .v{font-family:var(--display);font-weight:600;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.stat .v small{font-size:15px;color:var(--dim);font-family:var(--ui);font-weight:500;margin-left:3px}
.stat .meta{font-size:11.5px;color:var(--dim);margin-top:8px;font-family:var(--mono)}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.panel{padding:22px 24px}
.panel .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.panel .ph h3{font-family:var(--display);font-weight:500;font-size:18px}
.panel .ph .hint{font-size:11.5px;color:var(--faint)}

.bd{display:flex;flex-direction:column;gap:13px}
.bd .row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.bd .name{font-size:13px;color:var(--text)}
.bd .name small{color:var(--faint);font-size:11px;margin-left:6px;font-family:var(--mono)}
.bd .val{font-family:var(--mono);font-size:13px}
.bd .track{grid-column:1/-1;height:6px;border-radius:99px;background:var(--surface2);overflow:hidden}
.bd .fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.2,.7,.2,1)}

.openpos{display:flex;flex-direction:column;gap:12px}
.opos{border:1px solid var(--line-2);border-radius:var(--r-sm);padding:15px 17px;
  background:var(--surface2);display:grid;grid-template-columns:1fr auto;gap:6px 16px;align-items:center}
.opos .sym{font-weight:600;font-size:15px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.opos .tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:6px;font-weight:600}
.tag.buy{background:var(--green-soft);color:var(--green)} .tag.sell{background:var(--red-soft);color:var(--red)}
.opos .meta{font-size:12px;color:var(--dim);font-family:var(--mono)}
.opos .floatr{font-family:var(--display);font-size:24px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.opos .timer{font-family:var(--mono);font-size:12px;color:var(--faint);text-align:right}
.opos .acts{grid-column:1/-1;display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.opos .acts input{flex:1;max-width:150px}
.mini{padding:8px 12px;border-radius:8px;border:1px solid var(--line-2);background:var(--surface);
  font-size:12.5px;font-weight:500}
.mini:hover{background:var(--surface2)}
.mini.gold{background:var(--gold-soft);border-color:rgba(201,166,95,.3);color:var(--gold-2)}
.mini.danger{border-color:rgba(220,106,99,.4);color:var(--red)}

.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px}
thead th{text-align:left;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
  font-weight:600;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--bg2);white-space:nowrap}
tbody td{padding:13px 16px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr{transition:background .12s;cursor:pointer}
tbody tr:hover{background:var(--surface)}
tbody tr:last-child td{border-bottom:none}
td .pill{font-size:10.5px;padding:3px 8px;border-radius:6px;font-weight:600;letter-spacing:.04em}
td .strat{color:var(--dim)}
td .imgdot{display:inline-flex;width:18px;height:18px;color:var(--gold)}
.del-btn{background:none;border:none;color:var(--faint);padding:4px;border-radius:6px}
.del-btn:hover{color:var(--red);background:var(--red-soft)}

.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px 18px}
.form-grid .full{grid-column:1/-1}
.form-grid label,.flabel{display:block;font-size:11px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--faint);margin-bottom:7px}
select.input{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%239A9AA4' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 14px center;padding-right:36px}
textarea.input{resize:vertical;min-height:84px;line-height:1.55}
.seg{display:flex;gap:0;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.seg button{flex:1;padding:12px;background:var(--surface);border:none;color:var(--dim);font-weight:600;font-size:13.5px;transition:.15s}
.seg button.on-buy{background:var(--green-soft);color:var(--green)}
.seg button.on-sell{background:var(--red-soft);color:var(--red)}
.calc-strip{display:flex;gap:24px;flex-wrap:wrap;padding:15px 18px;background:var(--surface2);
  border-radius:var(--r-sm);margin:4px 0;border:1px dashed var(--line-2)}
.calc-strip .c{font-size:12px;color:var(--faint)}
.calc-strip .c b{display:block;font-family:var(--mono);font-size:18px;color:var(--text);font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap}
.form-actions .btn{width:auto;padding:13px 26px}
.rating{display:flex;gap:7px}
.rating button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--surface);
  color:var(--faint);font-weight:600;font-size:13px}
.rating button.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold-2)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 13px;border-radius:99px;border:1px solid var(--line);background:var(--surface);
  font-size:12.5px;color:var(--dim);transition:.15s}
.chip.on{background:var(--red-soft);border-color:rgba(220,106,99,.4);color:var(--red)}

/* image dropzone */
.dropzone{border:1.5px dashed var(--line-2);border-radius:var(--r-sm);padding:22px;text-align:center;
  color:var(--dim);background:var(--surface);cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.dropzone:hover{border-color:var(--gold);color:var(--text)}
.dropzone svg{width:26px;height:26px;color:var(--faint);margin-bottom:8px}
.dropzone.has{padding:0;border-style:solid}
.dropzone.has img{width:100%;display:block;max-height:260px;object-fit:contain;background:#0a0a0c}
.dropzone .rm{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);border:1px solid var(--line-2);
  color:#fff;border-radius:8px;padding:5px 10px;font-size:12px}

/* editable list rows */
.elist{display:flex;flex-direction:column;gap:10px}
.erow{display:flex;gap:10px;align-items:center}
.erow .input{flex:1}
.erow .grip{color:var(--faint);font-size:13px;width:18px;text-align:center}
.erow .x{background:none;border:none;color:var(--faint);padding:8px;border-radius:8px}
.erow .x:hover{color:var(--red);background:var(--red-soft)}
.ckbox{width:30px;height:30px;flex-shrink:0;border-radius:8px;border:1.5px solid var(--line-2);background:var(--surface);display:flex;align-items:center;justify-content:center;color:#1a1408;transition:.15s}
.ckbox.on{background:linear-gradient(180deg,var(--gold-2),var(--gold));border-color:var(--gold)}
.addrow{display:flex;gap:10px;margin-top:4px}

/* setups */
.setup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.setup-card{border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;background:var(--surface)}
.setup-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.setup-card .nm{font-family:var(--display);font-size:17px;font-weight:500}
.setup-card .wr{font-family:var(--display);font-size:34px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
.setup-card .wrbar{height:6px;border-radius:99px;background:var(--surface2);overflow:hidden;margin:10px 0 12px}
.setup-card .wrbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-2))}
.setup-card .ss{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);font-family:var(--mono)}
.setup-card .acts{display:flex;gap:8px;margin-top:14px}

/* vision board */
.vboard{column-width:320px;column-gap:18px}
.vtile{border-radius:var(--r);overflow:hidden;position:relative;border:1px solid var(--line);background:var(--surface);break-inside:avoid;margin:0 0 18px;width:100%;display:inline-block}
.vtile.img{background:#0b0b0d}
.vtile.img img{width:100%;height:auto;object-fit:contain;cursor:zoom-in;display:block;min-height:80px}
.vtile.img .zoomhint{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.55);color:#fff;border-radius:7px;padding:3px 9px;font-size:10.5px;opacity:0;transition:.2s;pointer-events:none}
.vtile.img:hover .zoomhint{opacity:1}
.vtile.txt{display:flex;align-items:center;justify-content:center;padding:28px 22px;text-align:center;min-height:120px;
  background:linear-gradient(140deg,rgba(201,166,95,.1),var(--surface))}
.vtile.txt p{font-family:var(--display);font-style:italic;font-size:19px;line-height:1.45;color:var(--gold-2)}
.vtile .rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:1px solid var(--line-2);
  color:#fff;border-radius:8px;padding:4px 9px;font-size:11px;opacity:0;transition:.2s}
.vtile:hover .rm{opacity:1}
.vadd-row{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.vadd{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--line-2);border-radius:var(--r);
  color:var(--dim);cursor:pointer;font-size:13px;background:var(--surface);padding:14px 22px;flex:1;min-width:180px;min-height:54px}
.vadd:hover{border-color:var(--gold);color:var(--text);background:var(--gold-soft)}
.vadd svg{width:20px;height:20px}

/* modal + lightbox */
.modal{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;padding:24px;
  background:rgba(5,5,8,.78);backdrop-filter:blur(8px)}
.modal.open{display:flex;animation:fade .2s}
.modal-card{background:var(--bg2);border:1px solid var(--line-2);border-radius:var(--r);max-width:620px;width:100%;
  max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
.modal-card .mh{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;
  border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-card .mh h3{font-family:var(--display);font-weight:500;font-size:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-card .mh .x{background:none;border:none;color:var(--dim);font-size:22px;padding:0 4px;line-height:1}
.modal-body{padding:22px 24px}
.detail-img{width:100%;border-radius:var(--r-sm);border:1px solid var(--line);margin-bottom:18px;cursor:zoom-in;
  display:block;max-height:340px;object-fit:contain;background:#0a0a0c}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px;margin-bottom:18px}
.dgrid .d{font-size:12px;color:var(--faint)}
.dgrid .d b{display:block;font-size:15px;color:var(--text);margin-top:4px;font-weight:500;font-family:var(--mono)}
.dnotes{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:15px 17px;
  font-size:13.5px;line-height:1.6;color:var(--dim);white-space:pre-wrap}
.lightbox{position:fixed;inset:0;z-index:140;display:none;align-items:center;justify-content:center;padding:30px;
  background:rgba(0,0,0,.92);cursor:zoom-out}
.lightbox.open{display:flex;animation:fade .2s}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 30px 80px rgba(0,0,0,.6)}

/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-nav .mlabel{font-family:var(--display);font-size:22px;font-weight:500;min-width:160px;text-align:center}
.cal-nav button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line-2);background:var(--surface);display:flex;align-items:center;justify-content:center}
.cal-nav button svg{width:16px;height:16px}
.cal-scroll{overflow-x:auto;border-radius:var(--r);border:1px solid var(--line)}
.cal{min-width:740px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--line)}
.cal-dow div{padding:10px 12px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:120px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;display:flex;flex-direction:column;gap:5px}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.dim{background:rgba(255,255,255,.012)}
.cal-cell.cell-pos{box-shadow:inset 3px 0 0 var(--green)}
.cal-cell.cell-neg{box-shadow:inset 3px 0 0 var(--red)}
.cal-cell .dtop{display:flex;justify-content:space-between;align-items:center;min-height:18px}
.cal-cell .dnum{font-size:12px;color:var(--dim);font-family:var(--mono)}
.cal-cell.today .dnum{background:var(--gold);color:#1a1408;border-radius:6px;padding:1px 6px;font-weight:600}
.cal-cell .dnet{font-size:11px;font-family:var(--mono);font-weight:600}
.cal-card{border-radius:7px;padding:6px 8px;cursor:pointer;border:1px solid var(--line);background:var(--surface);transition:.12s}
.cal-card:hover{border-color:var(--gold);background:var(--surface2)}
.cal-card .cs{font-weight:600;font-size:11.5px}
.cal-card .cp{font-family:var(--mono);font-size:11px;margin-top:1px}
.cal-card .cb{font-size:9px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:4px}
.cb.win{background:var(--green-soft);color:var(--green)}.cb.loss{background:var(--red-soft);color:var(--red)}.cb.be{background:var(--gold-soft);color:var(--gold-2)}.cb.open{background:rgba(123,167,217,.16);color:var(--blue)}

/* monthly report */
.mreport{display:flex;flex-direction:column;gap:14px}
.mcard{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);overflow:hidden}
.mcard .mtop{display:grid;grid-template-columns:1.3fr repeat(4,1fr) 24px;gap:14px;align-items:center;padding:18px 22px;cursor:pointer}
.mcard .mtop:hover{background:var(--surface2)}
.mcard .mname{font-family:var(--display);font-size:20px;font-weight:500}
.mcard .mk{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.mcard .mv{font-family:var(--mono);font-size:17px;font-weight:600;font-variant-numeric:tabular-nums}
.mcard .chev{color:var(--faint);transition:transform .2s}
.mcard.open .chev{transform:rotate(180deg)}
.mcard .mbody{border-top:1px solid var(--line);display:none}
.mcard.open .mbody{display:block}
.pf-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.pf-card{border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;background:var(--surface)}
.pf-card .nm{font-weight:600;font-size:15px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.pf-card .bk{font-size:11.5px;color:var(--faint);margin-top:2px}
.pf-card .eq{font-family:var(--display);font-size:27px;font-weight:600;margin:12px 0 4px;font-variant-numeric:tabular-nums}
.pf-card .sub{font-size:12px;font-family:var(--mono);color:var(--dim)}
.growth{width:100%;height:auto;display:block}
@media (max-width:900px){.mcard .mtop{grid-template-columns:1fr 1fr 24px;gap:10px}.mcard .mname{grid-column:1/-1}}

.empty{text-align:center;padding:60px 24px;color:var(--dim)}
.empty svg{width:38px;height:38px;color:var(--faint);margin-bottom:16px}
.empty h3{font-family:var(--display);font-size:21px;font-weight:500;color:var(--text);margin-bottom:8px}
.empty p{font-size:13.5px;max-width:360px;margin:0 auto 20px;line-height:1.55}
.empty .btn{width:auto;display:inline-block;padding:12px 26px}

#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--surface2);border:1px solid var(--line-2);padding:13px 22px;border-radius:99px;
  font-size:13.5px;z-index:200;transition:.3s;box-shadow:var(--shadow);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,192,141,.5)}70%{box-shadow:0 0 0 7px rgba(95,192,141,0)}100%{box-shadow:0 0 0 0 rgba(95,192,141,0)}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

@media (max-width:900px){
  #app.live{grid-template-columns:1fr}
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;flex-direction:row;
    border-right:none;border-top:1px solid var(--line);padding:6px;z-index:40;overflow-x:auto;
    background:rgba(11,11,15,.94);backdrop-filter:blur(14px)}
  .brand,.side-foot,.nav .sechead{display:none}
  .nav{flex-direction:row;justify-content:space-around;gap:0;overflow:visible}
  .nav button{flex-direction:column;gap:4px;font-size:9.5px;padding:7px 5px;white-space:nowrap}
  .nav .add{background:none;border:none;color:var(--gold-2)}
  .main{padding-bottom:66px}
  .hero{grid-template-columns:1fr}
  .row2,.row3{grid-template-columns:1fr}
  .form-grid,.dgrid{grid-template-columns:1fr}
  .topbar{padding:12px 16px;flex-wrap:wrap;gap:10px}
  .view{padding:20px 16px}
  .hero .equity .big{font-size:40px}
  .sessions{order:3;width:100%}
}
/* ============================================================ REFINEMENTS / POLISH */
/* warmer, deeper canvas */
body{background:
  radial-gradient(1300px 820px at 82% -12%, rgba(201,166,95,.075), transparent 58%),
  radial-gradient(1000px 760px at -12% 112%, rgba(123,167,217,.055), transparent 55%),
  radial-gradient(900px 900px at 50% 50%, rgba(255,255,255,.012), transparent 70%),
  var(--bg);}
/* custom scrollbars */
*{scrollbar-width:thin;scrollbar-color:rgba(201,166,95,.28) transparent}
*::-webkit-scrollbar{width:9px;height:9px}
*::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold),rgba(201,166,95,.4));border-radius:99px;border:2px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}
/* cards: hairline top highlight + layered shadow + warmer edge */
.card{border-color:rgba(201,166,95,.10);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 20px 50px -24px rgba(0,0,0,.75),0 2px 8px -4px rgba(0,0,0,.5)}
.panel,.stat{position:relative}
/* brand mark gradient + glow */
.brand .mark{background:linear-gradient(145deg,rgba(201,166,95,.28),rgba(201,166,95,.06));box-shadow:0 0 0 1px rgba(201,166,95,.25),0 6px 18px -8px rgba(201,166,95,.5)}
.brand .name{letter-spacing:-.01em}
/* sidebar active accent bar */
.nav button{position:relative}
.nav button.active::before{content:"";position:absolute;left:-16px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(var(--gold-2),var(--gold))}
/* buttons: inner sheen */
.btn{box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 10px 24px -12px rgba(201,166,95,.6)}
.btn:hover{box-shadow:0 1px 0 rgba(255,255,255,.45) inset,0 14px 30px -12px rgba(201,166,95,.7)}
.mini{transition:border-color .15s,background .15s,transform .1s}
.mini:hover{border-color:rgba(201,166,95,.35)}
.mini:active{transform:translateY(1px)}
/* inputs: soft gold focus glow */
.input:focus{box-shadow:0 0 0 3px rgba(201,166,95,.14)}
/* hero equity: glow + gradient figure */
.hero .equity{position:relative;overflow:hidden}
.hero .equity::after{content:"";position:absolute;top:-40%;right:-10%;width:60%;height:90%;background:radial-gradient(circle, rgba(201,166,95,.10), transparent 70%);pointer-events:none}
.hero .equity .big{background:linear-gradient(180deg,#FBF3DF,var(--gold-2) 78%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 14px rgba(201,166,95,.18))}
/* stat cards: gold top accent on hover */
.stat::after{content:"";position:absolute;left:20px;right:20px;top:0;height:2px;border-radius:0 0 3px 3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .25s}
.stat:hover::after{opacity:.7}
.statgrid .stat,.setup-card,.pf-card{transition:transform .18s cubic-bezier(.2,.7,.2,1),border-color .18s,box-shadow .18s}
.statgrid .stat:hover,.setup-card:hover,.pf-card:hover{transform:translateY(-2px);border-color:rgba(201,166,95,.22);box-shadow:0 16px 34px -20px rgba(0,0,0,.7)}
/* section heading h3 gets subtle gold tick */
.panel .ph h3{position:relative;padding-left:13px}
.panel .ph h3::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:15px;border-radius:2px;background:linear-gradient(var(--gold-2),var(--gold))}
/* affirmation banner refinement */
.affirm{position:relative;overflow:hidden;box-shadow:0 14px 36px -24px rgba(201,166,95,.5)}
.affirm::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 120px at 100% 0%, rgba(201,166,95,.12), transparent 70%);pointer-events:none}
/* table polish */
thead th{background:linear-gradient(180deg,#121217,var(--bg2))}
tbody tr:hover{background:rgba(201,166,95,.05)}
/* topbar live dot + clock */
.topbar{box-shadow:0 1px 0 rgba(255,255,255,.03)}
.topbar .clock .t{background:linear-gradient(180deg,#fff,#cfcfd6);-webkit-background-clip:text;background-clip:text;color:transparent}
.pf-switch>button{transition:border-color .15s,background .15s}
.pf-switch>button:hover{border-color:rgba(201,166,95,.4)}
/* calendar polish */
.cal{background:linear-gradient(180deg,var(--surface),var(--bg2))}
.cal-cell{transition:background .15s}
.cal-cell:hover:not(.dim){background:rgba(201,166,95,.035)}
.cal-card{box-shadow:0 2px 6px -3px rgba(0,0,0,.5)}
.cal-card[draggable]{cursor:grab}
.cal-card[draggable]:active{cursor:grabbing}
.cal-card:hover{transform:translateY(-1px)}
.cal-card.dragging{opacity:.45;outline:1px dashed var(--gold)}
.cal-cell.drop-hover{background:rgba(201,166,95,.14)!important;box-shadow:inset 0 0 0 2px var(--gold)}
.cal-cell.today{background:rgba(201,166,95,.05)}
/* report mode toggle */
.rseg{display:inline-flex;border:1px solid var(--line-2);border-radius:99px;overflow:hidden;background:var(--surface);height:fit-content}
.rseg button{padding:9px 18px;border:none;background:none;color:var(--dim);font-weight:600;font-size:13px;transition:.15s}
.rseg button.on{background:linear-gradient(180deg,var(--gold-2),var(--gold));color:#1a1408}
/* gate refinement */
.gate-card .crest{box-shadow:0 0 0 1px rgba(201,166,95,.2),0 10px 30px -12px rgba(201,166,95,.5)}
.gate-card h1{letter-spacing:-.015em}
#gate{background:
  radial-gradient(1100px 760px at 50% -8%, rgba(201,166,95,.10), transparent 58%),
  radial-gradient(700px 500px at 50% 108%, rgba(123,167,217,.06), transparent 60%),
  var(--bg)}
/* money pos/neg kept crisp (no global glow) */
@media (max-width:900px){.nav button.active::before{display:none}.view-head .rseg{order:3}}
/* ============================================================ NEW ELEMENTS + MODERN REFRESH */
/* inline wording editor */
.edit-pencil{background:rgba(255,255,255,.04);border:1px solid var(--line-2);color:var(--dim);width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.edit-pencil:hover{color:var(--gold-2);border-color:rgba(201,166,95,.4);background:var(--gold-soft)}
.edit-pencil svg{width:15px;height:15px}
.head-edit{}
/* multi-image grid */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:8px}
.img-thumb{position:relative;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--line-2);aspect-ratio:16/10;background:#0a0a0c}
.img-thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block}
.img-thumb .rm{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:7px;background:rgba(0,0,0,.65);border:1px solid var(--line-2);color:#fff;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
.img-thumb .rm:hover{background:var(--red);border-color:var(--red)}
.img-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:1.5px dashed var(--line-2);border-radius:var(--r-sm);background:var(--surface);color:var(--dim);aspect-ratio:16/10;font-size:12.5px;transition:.18s}
.img-add:hover{border-color:var(--gold);color:var(--text);background:var(--gold-soft)}
.img-add svg{width:24px;height:24px;color:var(--faint)}
.img-add:hover svg{color:var(--gold-2)}
/* detail gallery */
.detail-gallery{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.detail-gallery .detail-img{margin-bottom:0}
/* to-do list */
.todo-prog{display:flex;align-items:center;gap:16px;padding:6px 2px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
.ring{--p:0;width:66px;height:66px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--gold) calc(var(--p)*1%), rgba(255,255,255,.07) 0);position:relative}
.ring::before{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--surface)}
.ring span{position:relative;font-family:var(--mono);font-size:15px;font-weight:600;color:var(--gold-2)}
.todo-prog-meta b{display:block;font-family:var(--display);font-size:20px;font-weight:600}
.todo-prog-meta small{color:var(--dim);font-size:12.5px}
.todo-row{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--r-sm);background:var(--surface2);
  border:1px solid var(--line);margin-bottom:8px;transition:.15s;font-size:14px}
.todo-row:hover{border-color:var(--line-2)}
.todo-row.done{opacity:.55}.todo-row.done span{text-decoration:line-through;color:var(--dim)}
.todo-row span{flex:1}
.todo-empty{padding:22px;text-align:center;color:var(--green);font-size:13.5px;background:var(--green-soft);border-radius:var(--r-sm)}
.todo-done{margin-top:6px}
.todo-done summary{cursor:pointer;color:var(--faint);font-size:12.5px;padding:8px 2px;list-style:none}
.todo-done summary::-webkit-details-marker{display:none}
.todo-done summary:hover{color:var(--dim)}
.todo-track{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.todo-track .tt{text-align:center;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 8px}
.todo-track .tt b{display:block;font-family:var(--display);font-size:24px;font-weight:600;color:var(--gold-2);line-height:1}
.todo-track .tt small{display:block;color:var(--faint);font-size:10.5px;margin-top:5px;line-height:1.3}
.ckbox{cursor:pointer}

/* ---- MODERN REFRESH: crisper, more contemporary ---- */
:root{--r:16px;--r-sm:12px}
.view-head h2{letter-spacing:-.02em}
/* glassier topbar + sidebar */
.topbar{background:rgba(11,11,15,.7);backdrop-filter:blur(18px) saturate(1.2)}
.sidebar{background:linear-gradient(180deg,rgba(18,18,22,.6),rgba(11,11,15,.2))}
/* nav: pill-style active with soft fill */
.nav button{border-radius:11px}
.nav button.active{background:linear-gradient(100deg,rgba(201,166,95,.16),rgba(201,166,95,.05));color:#fff}
.nav button.active::before{top:10px;bottom:10px}
/* cards: slightly more rounded, cleaner border, soft inner light */
.card{border-radius:var(--r);border-color:rgba(255,255,255,.08)}
.panel .ph h3{letter-spacing:-.01em}
/* pills & tags: rounder, modern */
td .pill,.tag,.cb{border-radius:7px}
/* segmented controls more modern */
.seg{border-radius:12px}
.rseg{box-shadow:0 1px 0 rgba(255,255,255,.04) inset}
/* inputs: rounder, subtle fill */
.input{border-radius:11px;background:rgba(255,255,255,.025)}
.input:focus{background:rgba(255,255,255,.05)}
/* buttons rounder */
.btn,.mini{border-radius:11px}
/* hero number a touch tighter */
.hero .equity .big{letter-spacing:-.02em}
/* live badge pill */
.live-badge{background:var(--green-soft);padding:5px 11px;border-radius:99px}
/* calendar cards rounder, cleaner */
.cal-card{border-radius:9px}
.cal{border-radius:0}
/* scrollbar a touch slimmer */
*::-webkit-scrollbar{width:8px;height:8px}
@media (max-width:900px){.todo-track{grid-template-columns:repeat(3,1fr)}.img-grid{grid-template-columns:repeat(2,1fr)}}

/* ============================================================ COLOR INJECTION (less monochrome, more pop) */
:root{--violet:#9B8CFF;--teal:#5FD0C8;--rose:#F0729B;--amber:#E8B65A}
body{background:
  radial-gradient(1200px 760px at 84% -14%, rgba(201,166,95,.10), transparent 56%),
  radial-gradient(1000px 720px at -12% 8%, rgba(123,167,217,.10), transparent 52%),
  radial-gradient(900px 720px at 110% 70%, rgba(155,140,255,.08), transparent 55%),
  radial-gradient(1000px 800px at -10% 115%, rgba(95,208,200,.07), transparent 55%),
  var(--bg);}
/* affirmation banner — vibrant gradient sweep */
.affirm{display:flex;align-items:center;gap:14px;
  background:linear-gradient(115deg, rgba(201,166,95,.16), rgba(155,140,255,.10) 48%, rgba(95,208,200,.10));
  border:1px solid rgba(201,166,95,.28)}
.affirm .mk{color:var(--gold)}
.affirm .q{color:#F3E9D2}
.affirm-acts{display:flex;gap:8px;flex-shrink:0}
.aff-btn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line-2);background:rgba(255,255,255,.05);
  color:var(--dim);display:flex;align-items:center;justify-content:center;transition:.15s}
.aff-btn:hover{color:var(--gold-2);border-color:rgba(201,166,95,.4);background:var(--gold-soft);transform:translateY(-1px)}
.aff-btn svg{width:15px;height:15px}
/* stat cards — meaning-based color accents */
.stat.accent-green{background:linear-gradient(180deg,rgba(95,192,141,.07),var(--bg2))}
.stat.accent-blue{background:linear-gradient(180deg,rgba(123,167,217,.08),var(--bg2))}
.stat.accent-gold{background:linear-gradient(180deg,rgba(201,166,95,.08),var(--bg2))}
.stat.accent-red{background:linear-gradient(180deg,rgba(220,106,99,.07),var(--bg2))}
.stat.accent-green::after{background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.55}
.stat.accent-blue::after{background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.55}
.stat.accent-gold::after{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.55}
.stat.accent-red::after{background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:.55}
.stat.accent-green .k{color:rgba(95,192,141,.85)}

<script>
/* ============================================================ STORAGE */
const mem={};
const Store={
  async get(k){try{const r=await window.storage.get(k);return r?r.value:null;}catch(e){return (k in mem)?mem[k]:null;}},
  async set(k,v){try{const r=await window.storage.set(k,v);if(r)return true;}catch(e){}mem[k]=v;return true;},
  async del(k){try{await window.storage.delete(k);}catch(e){}delete mem[k];},
  async list(prefix){try{const r=await window.storage.list(prefix);if(r&&r.keys)return r.keys;}catch(e){}return Object.keys(mem).filter(k=>!prefix||k.startsWith(prefix));}
};
const ACCT_KEY='rtm:accounts';
let currentUser=null;
function ak(suffix){return 'acct:'+currentUser+':'+suffix;}
function hash(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0).toString(36);}

/* ============================================================ STATE */
let TRADES=[];
let PORTFOLIOS=[];
let SETUPS=[];
let SETUP_INFO={};
let PLAYBOOK={affirmations:[],rules:[],vision:[],weekly:[],monthly:[],checks:{},mistakeTags:[]};
const DEFAULT_TAGLINE='วินัยวันนี้ คืออิสรภาพในวันหน้า — discipline today, freedom tomorrow.';
let BRAND={name:'Road To Million',tagline:DEFAULT_TAGLINE,deskTitle:'The Desk'};
let CURRENT_EMAIL=null,CURRENT_NAME=null;
let activePF='all';
let currentView='dashboard';
let tradeLimit=200;
let editingId=null;
let calCursor={y:2026,m:5};
let expandedMonth=null;
let reportMode='month';
let expandedYear=null;
let editingHead=false;
let todoEditKind=null;
let editingAff=false;
let affOverride=null;
let currentAffIdx=-1;

const DEFAULT_SETUPS=['Rally','Impulse','3หด-3ขยาย','Wyckoff','Sideway Safe','ตัวคั่น Trend','แท่งสมบูรณ์','Imp / RS','นับแท่ง','Breakout','Reversal'];
const DEFAULT_AFFIRM=['ฉันเทรดตามแผน ไม่เทรดตามอารมณ์','การขาดทุนคือต้นทุนของธุรกิจ ไม่ใช่ความล้มเหลว','ฉันรอ setup ที่ใช่ ความอดทนคือ edge ของฉัน','ฉันบริหารความเสี่ยงก่อนคิดถึงกำไรเสมอ'];
const DEFAULT_RULES=['เสี่ยงไม่เกิน 1% ต่อไม้','ไม่ขยับ Stop Loss ออกเด็ดขาด','เข้าเฉพาะ setup ที่อยู่ในแผน','RR ขั้นต่ำ 1:2','หยุดเทรดเมื่อขาดทุนติดกัน 3 ไม้'];
const DEFAULT_WEEKLY=['ทบทวนเทรดทั้งสัปดาห์','อัปเดต Journal ครบทุกออเดอร์','ดู win-rate และ R รายสัปดาห์','วางแผนคู่เงิน/แผนสัปดาห์หน้า','พักผ่อนให้พอ ไม่ revenge trade'];
const DEFAULT_MONTHLY=['สรุป P&L รายเดือน','ทบทวน setup ไหนทำกำไร/ขาดทุน','ปรับปรุง Trading Rules ถ้าจำเป็น','ตั้งเป้าหมายเดือนถัดไป','บริหารเงินทุน / ถอนกำไรตามแผน'];
const SESSIONS_LIST=['Sydney','Tokyo','London','New York'];
const TIMEFRAMES=['M1','M5','M15','M30','H1','H4','D1','W1'];
const MISTAKES=['Overtrading','Moved stop','No setup','FOMO','Revenge','Early exit','Late entry','Oversized','Against trend','Ignored plan'];

/* ============================================================ HELPERS */
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function activePFobj(){return PORTFOLIOS.find(p=>p.id===activePF);}
function curSym(){const p=activePFobj();return p?p.symbol:'$';}
function curCode(){const p=activePFobj();return p?p.currency:'USD';}
function fmtMoney(n){const s=curSym();return (n<0?'-':'')+s+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
const fmtR=n=>(n>=0?'+':'')+n.toFixed(2)+'R';
function pfTrades(){return activePF==='all'?TRADES:TRADES.filter(t=>t.portfolioId===activePF);}
function startBal(){if(activePF==='all')return PORTFOLIOS.reduce((s,p)=>s+(+p.startBalance||0),0);const p=activePFobj();return p?+p.startBalance:0;}
function closed(){return pfTrades().filter(t=>t.status==='closed');}
function openT(){return pfTrades().filter(t=>t.status==='open');}
function pfName(id){const p=PORTFOLIOS.find(x=>x.id===id);return p?p.name:'—';}

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* Thai time helpers (ICT, GMT+7, no DST) */
function bkkParts(d=new Date()){
  return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(d).reduce((a,p)=>(a[p.type]=p.value,a),{});
}
function bkkInputValue(d=new Date()){const p=bkkParts(d);return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}`;}
function fmtDate(iso){if(!iso)return '—';return new Date(iso).toLocaleString('en-GB',{timeZone:'Asia/Bangkok',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDateShort(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('en-GB',{timeZone:'Asia/Bangkok',day:'2-digit',month:'short'});}

function calcR(t){
  if(t.entry&&t.stop&&t.exit&&t.entry!==t.stop){const risk=Math.abs(t.entry-t.stop);const rew=(t.dir==='buy')?(t.exit-t.entry):(t.entry-t.exit);return rew/risk;}
  return (typeof t.rManual==='number')?t.rManual:null;
}
function floatR(t,price){if(!t.entry||!t.stop||t.entry===t.stop||price==null)return null;const risk=Math.abs(t.entry-t.stop);const move=(t.dir==='buy')?(price-t.entry):(t.entry-price);return move/risk;}
function durationMs(t){if(!t.entryAt||!t.exitAt||t.status==='open')return null;const ms=new Date(t.exitAt)-new Date(t.entryAt);return ms>=0?ms:null;}
function fmtDuration(t){const ms=durationMs(t);if(ms==null)return null;const m=Math.round(ms/60000);if(m<1)return '<1m';if(m<60)return m+'m';const h=Math.floor(m/60),mm=m%60;if(h<24)return h+'h'+(mm?' '+mm+'m':'');const dd=Math.floor(h/24),hh=h%24;return dd+'d'+(hh?' '+hh+'h':'');}

/* ============================================================ STATS */
function stats(){
  const c=closed();
  const wins=c.filter(t=>outcome(t)==='win'),losses=c.filter(t=>outcome(t)==='loss');
  const gp=wins.reduce((s,t)=>s+t.pnl,0),gl=Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const net=c.reduce((s,t)=>s+(t.pnl||0),0);
  const rs=c.map(calcR).filter(r=>r!=null);
  const totalR=rs.reduce((s,r)=>s+r,0);
  let streak=0,dir=null;
  const sorted=[...c].sort((a,b)=>new Date(tradeDate(b))-new Date(tradeDate(a)));
  for(const t of sorted){const w=t.pnl>0;if(dir===null){dir=w;streak=1;}else if(w===dir)streak++;else break;}
  const chrono=[...c].sort((a,b)=>new Date(tradeDate(a))-new Date(tradeDate(b)));
  let eq=startBal(),peak=eq,maxDD=0;const curve=[eq];
  for(const t of chrono){eq+=t.pnl||0;curve.push(eq);if(eq>peak)peak=eq;const dd=peak-eq;if(dd>maxDD)maxDD=dd;}
  return{count:c.length,wins:wins.length,losses:losses.length,
    winRate:c.length?wins.length/((wins.length+losses.length)||1)*100:0,
    net,equity:startBal()+net,pf:gl?gp/gl:(gp>0?Infinity:0),
    totalR,avgR:rs.length?totalR/rs.length:0,expectancy:c.length?net/c.length:0,
    maxDD,maxDDpct:peak?maxDD/peak*100:0,streak,streakDir:dir,
    best:c.length?Math.max(...c.map(t=>t.pnl||0)):0,worst:c.length?Math.min(...c.map(t=>t.pnl||0)):0,
    curve,openCount:openT().length};
}
function groupBy(key){
  const c=closed();const m={};
  for(const t of c){const g=t[key]||'—';if(!m[g])m[g]={n:0,net:0,wins:0};m[g].n++;m[g].net+=t.pnl||0;if(t.pnl>0)m[g].wins++;}
  return Object.entries(m).map(([k,v])=>({k,...v,wr:v.n?v.wins/v.n*100:0})).sort((a,b)=>b.net-a.net);
}

/* ============================================================ CURVE */
function curveSVG(curve,h=120){
  const w=520;
  if(curve.length<2)return `<svg class="curve" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><line x1="0" y1="${h-1}" x2="${w}" y2="${h-1}" stroke="var(--line)"/></svg>`;
  // downsample very long curves so the SVG path stays light (keeps shape + last point)
  const MAXP=600;
  if(curve.length>MAXP){const step=curve.length/MAXP;const ds=[];for(let i=0;i<MAXP;i++)ds.push(curve[Math.floor(i*step)]);ds.push(curve[curve.length-1]);curve=ds;}
  const min=Math.min(...curve),max=Math.max(...curve),pad=(max-min)*0.12||1,lo=min-pad,hi=max+pad,span=hi-lo;
  const X=i=>i/(curve.length-1)*w,Y=v=>h-((v-lo)/span)*h;
  let d='M'+X(0)+' '+Y(curve[0]);for(let i=1;i<curve.length;i++)d+=' L'+X(i).toFixed(1)+' '+Y(curve[i]).toFixed(1);
  const up=curve[curve.length-1]>=curve[0],col=up?'var(--green)':'var(--red)',gid='g'+Math.random().toString(36).slice(2,7);
  const area=d+` L${w} ${h} L0 ${h} Z`,base=Y(startBal());
  return `<svg class="curve" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".22"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>${base>=0&&base<=h?`<line x1="0" y1="${base.toFixed(1)}" x2="${w}" y2="${base.toFixed(1)}" stroke="var(--line-2)" stroke-dasharray="3 4"/>`:''}<path d="${area}" fill="url(#${gid})" stroke="none"/><path class="line" d="${d}" stroke="${col}"/><circle cx="${X(curve.length-1)}" cy="${Y(curve[curve.length-1]).toFixed(1)}" r="3.5" fill="${col}"/></svg>`;
}

/* ============================================================ IMAGE UTIL */
// Keep the uploaded image at full fidelity when it fits the storage cap (preserves exact quality & format, incl. PNG sharpness for charts).
// Only very large files are downscaled — and then at high resolution/quality.
const IMG_CAP=4.4*1024*1024; // ~4.4MB data-URL (storage limit is 5MB/key)
function readDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}
async function compressImage(file,maxDim=2800,quality=0.95){
  const orig=await readDataURL(file);
  if(orig.length<=IMG_CAP)return orig; // verbatim — identical to what was uploaded
  return await new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxDim/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');try{ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';}catch(e){}
      ctx.drawImage(img,0,0,w,h);
      let q=quality,out=c.toDataURL('image/jpeg',q);
      while(out.length>IMG_CAP&&q>0.5){q-=0.07;out=c.toDataURL('image/jpeg',q);}
      res(out);
    };img.onerror=rej;img.src=orig;
  });
}
function pickImage(){return new Promise(res=>{const inp=$('#hidden-file');inp.value='';inp.multiple=false;inp.onchange=()=>{const f=inp.files[0];res(f||null);};inp.click();});}
function pickImages(){return new Promise(res=>{const inp=$('#hidden-file');inp.value='';inp.multiple=true;inp.onchange=()=>{const fs=Array.from(inp.files||[]);inp.multiple=false;res(fs);};inp.click();});}
function tradeImgKeys(t){return (t.imgKeys&&t.imgKeys.length)?t.imgKeys:(t.imgKey?[t.imgKey]:[]);}
async function storeTradeImages(t){
  for(const k of tradeImgKeys(t)){await Store.del(k);}
  delete t.imgKey;
  const keys=[];const imgs=draft.images||[];
  for(let i=0;i<imgs.length;i++){const k=ak('img:'+t.id+':'+i);await Store.set(k,imgs[i]);keys.push(k);}
  if(keys.length)t.imgKeys=keys;else delete t.imgKeys;
}

/* ---------- TO-DO LIST (weekly + monthly, ticks disappear, consistency tracking) ---------- */
function checklistStats(kind){
  const items=PLAYBOOK[kind]||[];const total=items.length;
  const prefix=kind==='weekly'?'W:':'M:';
  const checks=PLAYBOOK.checks||{};
  const keys=Object.keys(checks).filter(k=>k.startsWith(prefix));
  let full=0,partial=0,tracked=0;
  const periodFull={};
  keys.forEach(k=>{const done=Object.values(checks[k]).filter(Boolean).length;if(done>0){tracked++;if(total&&done>=total){full++;periodFull[k]=true;}else partial++;}});
  // streak of consecutive fully-completed periods ending now/most-recent
  const curKey=kind==='weekly'?weekKey():monthKeyP();
  const curDone=items.filter(it=>checks[curKey]&&checks[curKey][it]).length;
  return {total,tracked,full,partial,curDone,curKey,curFull:total&&curDone>=total};
}

    <div class="view-head"><div><div class="eyebrow">Routine</div><h2>To-do List</h2><p>Tick a task and it clears from the list. Your consistency is tracked every week and month.</p></div></div>
    <div class="row2">
      ${todoPanel('weekly','Weekly to-do',weekKey(),weekLabel())}
      ${todoPanel('monthly','Monthly to-do',monthKeyP(),monthLabelP())}
    </div>
  </div>`;
}
function todoPanel(kind,title,periodKey,periodLabel){
  const items=PLAYBOOK[kind]||[];
  if(todoEditKind===kind){
    return `<div class="card panel"><div class="ph"><h3>${title}</h3><span class="hint">editing tasks</span></div>
      ${listEditor(items,kind+'L','Add a task…')}
      <div style="margin-top:12px"><button class="mini gold" id="${kind}-doneedit">Done editing</button></div></div>`;
  }
  const checks=(PLAYBOOK.checks&&PLAYBOOK.checks[periodKey])||{};
  const remaining=items.filter(it=>!checks[it]);
  const done=items.filter(it=>checks[it]);
  const st=checklistStats(kind);
  const pct=items.length?Math.round(done.length/items.length*100):0;
  return `<div class="card panel">
    <div class="ph"><h3>${title}</h3><span class="hint">${esc(periodLabel)}</span></div>
    <div class="todo-prog"><div class="ring" style="--p:${pct}"><span>${pct}%</span></div>
      <div class="todo-prog-meta"><b>${done.length} / ${items.length} done</b><small>${remaining.length?remaining.length+' task'+(remaining.length>1?'s':'')+' left':'All clear — great work'}</small></div></div>
    <div class="elist" style="margin-top:6px">
      ${remaining.length?remaining.map(it=>`<div class="todo-row"><button class="ckbox" data-ck="${esc(it)}" data-period="${periodKey}"></button><span>${esc(it)}</span></div>`).join(''):`<div class="todo-empty">✓ Nothing left for this ${kind==='weekly'?'week':'month'}</div>`}
    </div>
    ${done.length?`<details class="todo-done"><summary>${done.length} completed — show / undo</summary>${done.map(it=>`<div class="todo-row done"><button class="ckbox on" data-ck="${esc(it)}" data-period="${periodKey}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><span>${esc(it)}</span></div>`).join('')}</details>`:''}
    <div class="addrow" style="margin-top:14px"><input class="input" id="${kind}-new" placeholder="Add a task…"><button class="mini gold" id="${kind}-add">Add</button><button class="mini" id="${kind}-edit">Edit list</button></div>
    <div class="todo-track"><div class="tt"><b>${st.full}</b><small>${kind==='weekly'?'weeks':'months'} completed in full</small></div><div class="tt"><b>${st.partial}</b><small>partly missed</small></div><div class="tt"><b>${st.tracked}</b><small>${kind==='weekly'?'weeks':'months'} tracked</small></div></div>
  </div>`;
}

/* ============================================================ BIND */
function bindView(){
  document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{b.dataset.go==='add'?newTrade():go(b.dataset.go);});
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();delTrade(b.dataset.del);});
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();startEdit(b.dataset.edit);});
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=e=>{if(e.target.closest('.del-btn')||e.target.closest('[data-edit]'))return;openDetail(el.dataset.open);});
  const lm=$('#load-more');if(lm)lm.onclick=()=>{tradeLimit+=200;render();};

  if(currentView==='add')bindAdd();
  if(currentView==='settings')bindSettings();
  if(currentView==='setups')bindSetups();
  if(currentView==='playbook')bindPlaybook();
  if(currentView==='vision')bindVision();
  if(currentView==='calendar')bindCalendar();
  if(currentView==='report')bindReport();
  if(currentView==='todo')bindTodo();
  if(currentView==='dashboard')bindDashboard();

  document.querySelectorAll('.update-price').forEach(b=>b.onclick=()=>{const id=b.dataset.id,inp=document.querySelector('.price-in[data-id="'+id+'"]'),t=TRADES.find(x=>x.id===id);if(t){t.curPrice=parseFloat(inp.value);if(isNaN(t.curPrice))t.curPrice=null;persist(false);tickOpen();toast('Price updated');}});
  document.querySelectorAll('.close-trade').forEach(b=>b.onclick=()=>closeOpen(b.dataset.id));
  document.querySelectorAll('.detail-open').forEach(b=>b.onclick=()=>openDetail(b.dataset.id));
  tickOpen();
}

function bindDashboard(){
  const eb=$('#head-edit-btn');if(eb)eb.onclick=()=>{editingHead=true;render();};
  const sv=$('#head-save');if(sv)sv.onclick=()=>{BRAND.deskTitle=($('#head-title').value||'').trim()||'The Desk';BRAND.tagline=($('#head-tag').value||'').trim();saveMeta();editingHead=false;loadBrand();toast('Wording saved');render();};
  const cn=$('#head-cancel');if(cn)cn.onclick=()=>{editingHead=false;render();};
  const ae=$('#aff-edit');if(ae)ae.onclick=()=>{editingAff=true;render();};
  const ash=$('#aff-shuffle');if(ash)ash.onclick=()=>{if(PLAYBOOK.affirmations.length){affOverride=(currentAffIdx+1)%PLAYBOOK.affirmations.length;render();}};
  const asv=$('#aff-save');if(asv)asv.onclick=()=>{const v=($('#aff-edit-in').value||'').trim();if(v&&currentAffIdx>=0){PLAYBOOK.affirmations[currentAffIdx]=v;persistPlaybook();}editingAff=false;render();toast('Affirmation saved');};
  const ac=$('#aff-cancel');if(ac)ac.onclick=()=>{editingAff=false;render();};
}
function bindAdd(){
  const dir=k=>{draft.dir=k;$('#dir-buy').className=k==='buy'?'on-buy':'';$('#dir-sell').className=k==='sell'?'on-sell':'';updateCalc();};
  $('#dir-buy').onclick=()=>dir('buy');$('#dir-sell').onclick=()=>dir('sell');
  ['f-entry','f-stop','f-exit','f-tp','f-risk'].forEach(id=>{const el=$('#'+id);if(el)el.oninput=updateCalc;});
  document.querySelectorAll('#conf-rate button').forEach(b=>b.onclick=()=>{draft.conf=+b.dataset.n;document.querySelectorAll('#conf-rate button').forEach(x=>x.classList.toggle('on',+x.dataset.n<=draft.conf));});
  $('#plan-yes').onclick=()=>{draft.plan=true;$('#plan-yes').className='on-buy';$('#plan-no').className='';};
  $('#plan-no').onclick=()=>{draft.plan=false;$('#plan-no').className='on-sell';$('#plan-yes').className='';};
  document.querySelectorAll('#mistakes .chip').forEach(c=>c.onclick=()=>{const m=c.dataset.m,i=draft.mistakes.indexOf(m);if(i<0)draft.mistakes.push(m);else draft.mistakes.splice(i,1);c.classList.toggle('on');});
  const ma=$('#mistake-add');if(ma)ma.onclick=()=>{const inp=$('#mistake-new');const v=(inp.value||'').trim();if(!v)return;PLAYBOOK.mistakeTags=PLAYBOOK.mistakeTags||[];if(!allMistakes().includes(v))PLAYBOOK.mistakeTags.push(v);if(!draft.mistakes.includes(v))draft.mistakes.push(v);persistPlaybook(false);captureDraft();render();};
  const mn=$('#mistake-new');if(mn)mn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();ma.click();}});
  const ss=$('#f-status');const sync=()=>{const o=ss.value==='open';
    ['exit-wrap','pnl-wrap','result-wrap','closedate-wrap'].forEach(w=>{const el=$('#'+w);if(el)el.style.opacity=o?'.4':'1';});
    $('#f-exit').disabled=o;$('#f-pnl').disabled=o;$('#f-result').disabled=o;$('#f-closedate').disabled=o;};
  ss.onchange=()=>{sync();captureDraft();};sync();
  $('#f-date').value=draft.dateVal||bkkInputValue();
  $('#f-closedate').value=draft.closeVal||draft.dateVal||bkkInputValue();
  // capture draft fields on input so re-render (image) keeps them
  ['f-symbol','f-entry','f-stop','f-tp','f-lot','f-risk','f-fees','f-exit','f-pnl','f-notes'].forEach(id=>{const el=$('#'+id);if(el)el.addEventListener('input',captureDraft);});
  ['f-pf','f-strategy','f-tf','f-session','f-result'].forEach(id=>{const el=$('#'+id);if(el)el.onchange=()=>captureDraft();});
  $('#f-date').onchange=()=>{draft.dateVal=$('#f-date').value;};
  $('#f-closedate').onchange=()=>{draft.closeVal=$('#f-closedate').value;};
  const addImg=$('#add-img');
  if(addImg)addImg.onclick=async()=>{captureDraft();const fs=await pickImages();if(!fs.length)return;toast('Processing image'+(fs.length>1?'s':'')+'…');draft.images=draft.images||[];for(const f of fs){try{draft.images.push(await compressImage(f));}catch(e){}}render();};
  document.querySelectorAll('[data-rmimg]').forEach(b=>b.onclick=e=>{e.stopPropagation();draft.images.splice(+b.dataset.rmimg,1);render();});
  document.querySelectorAll('.img-thumb img[data-zoom]').forEach(im=>im.onclick=()=>openLightbox(im.src));
  $('#clear-draft').onclick=()=>{editingId=null;draft={dir:'buy',conf:3,mistakes:[],images:[]};render();};
  $('#save-trade').onclick=saveTrade;
  updateCalc();
}
function captureDraft(){
  const g=id=>$('#'+id)?.value;const n=id=>{const v=parseFloat($('#'+id)?.value);return isNaN(v)?null:v;};
  draft.portfolioId=g('f-pf');draft.symbol=g('f-symbol');draft.strategy=g('f-strategy');draft.tf=g('f-tf');draft.session=g('f-session');
  draft.entry=n('f-entry');draft.stop=n('f-stop');draft.tp=n('f-tp');draft.lot=n('f-lot');draft.risk=n('f-risk');draft.fees=n('f-fees');
  draft.exit=n('f-exit');draft.pnl=g('f-pnl');draft.status=g('f-status');draft.result=g('f-result');draft.closeVal=g('f-closedate');draft.notes=g('f-notes');draft.dateVal=g('f-date');
}
function updateCalc(){
  if(currentView!=='add')return;
  const entry=parseFloat($('#f-entry').value),stop=parseFloat($('#f-stop').value),exit=parseFloat($('#f-exit')?.value),tp=parseFloat($('#f-tp').value),risk=parseFloat($('#f-risk').value);
  let rr='—',rMul='—',riskAmt='—';
  if(entry&&stop&&entry!==stop){const rp=Math.abs(entry-stop);
    if(exit){const rew=(draft.dir==='buy')?(exit-entry):(entry-exit);rMul=(rew/rp>=0?'+':'')+(rew/rp).toFixed(2)+'R';}
    if(tp){const rew=(draft.dir==='buy')?(tp-entry):(entry-tp);rr='1 : '+(rew/rp).toFixed(2);}}
  if(risk)riskAmt=fmtMoney((PORTFOLIOS.find(p=>p.id===$('#f-pf')?.value)?.startBalance||startBal())*risk/100);
  $('#calc-strip').innerHTML=`<div class="c">Planned R:R<b>${rr}</b></div><div class="c">Result (from prices)<b>${rMul}</b></div><div class="c">Risk amount<b>${riskAmt}</b></div>`;
}
async function saveTrade(){
  captureDraft();
  const g=id=>($('#'+id)?.value||'').trim();const n=id=>{const v=parseFloat($('#'+id)?.value);return isNaN(v)?null:v;};
  const symbol=g('f-symbol');if(!symbol){toast('Add a symbol first');$('#f-symbol').focus();return;}
  const status=$('#f-status').value;
  const dv=$('#f-date').value;
  const entryAt=dv?new Date(dv+':00+07:00').toISOString():new Date().toISOString();
  const cv=$('#f-closedate').value;
  const closeAt=cv?new Date(cv+':00+07:00').toISOString():entryAt;
  const result=g('f-result')||undefined;
  const fields={portfolioId:g('f-pf'),symbol,dir:draft.dir,strategy:g('f-strategy'),tf:g('f-tf'),
    session:g('f-session')||sessionAt(new Date(entryAt)),entry:n('f-entry'),stop:n('f-stop'),tp:n('f-tp'),
    lot:n('f-lot'),risk:n('f-risk'),fees:n('f-fees'),conf:draft.conf,plan:draft.plan!==false,
    mistakes:[...draft.mistakes],notes:g('f-notes'),entryAt,status};

  if(editingId){
    const t=TRADES.find(x=>x.id===editingId);
    if(t){
      Object.assign(t,fields);
      if(status==='closed'){t.exit=n('f-exit');const pnl=n('f-pnl');t.pnl=pnl!=null?pnl:0;t.exitAt=closeAt;t.result=result;delete t.curPrice;}
      else{delete t.exit;delete t.pnl;delete t.exitAt;delete t.result;t.curPrice=(t.curPrice!=null?t.curPrice:t.entry);}
      await storeTradeImages(t);
      await persistTrades();editingId=null;draft={dir:'buy',conf:3,mistakes:[],images:[]};
      toast('Trade updated');go('trades');return;
    }
    editingId=null;
  }

  const id=uid();
  const t=Object.assign({id},fields);if(!t.portfolioId)t.portfolioId=PORTFOLIOS[0]?.id;
  if(status==='closed'){t.exit=n('f-exit');t.exitAt=closeAt;const pnl=n('f-pnl');t.pnl=pnl!=null?pnl:0;t.result=result;}
  else{t.curPrice=t.entry;}
  await storeTradeImages(t);
  TRADES.push(t);await persistTrades();
  draft={dir:'buy',conf:3,mistakes:[],images:[]};
  toast('Trade saved');go('trades');
}

}

/* ============================================================ CALENDAR DRAG: shift a trade by whole days (preserves entry→exit gap and time-of-day) */
function daysBetween(aKey,bKey){const[ay,am,ad]=aKey.split('-').map(Number);const[by,bm,bd]=bKey.split('-').map(Number);return Math.round((Date.UTC(by,bm-1,bd)-Date.UTC(ay,am-1,ad))/86400000);}
function shiftTradeByDays(t,delta){
  const add=iso=>{if(!iso)return iso;const p=bkkParts(new Date(iso));const base=new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:00+07:00`);base.setUTCDate(base.getUTCDate()+delta);return base.toISOString();};
  t.entryAt=add(t.entryAt);
  if(t.exitAt)t.exitAt=add(t.exitAt);
}

/* ============================================================ PERSIST */
/* Trades are sharded across many keys so history can grow far beyond a single 5MB key.
   Only shards whose content changed are rewritten, so saving stays fast even with 100k+ orders. */
const SHARD_SIZE=4000;
let _shardCache={};   // shardIndex -> last JSON string written (skip unchanged)
let _shardCount=0;    // number of shards currently persisted
async function persistTrades(){
  const n=Math.max(1,Math.ceil(TRADES.length/SHARD_SIZE));
  for(let i=0;i<n;i++){
    const s=JSON.stringify(TRADES.slice(i*SHARD_SIZE,(i+1)*SHARD_SIZE));
    if(_shardCache[i]!==s){await Store.set(ak('trades_s'+i),s);_shardCache[i]=s;}
  }
  for(let i=n;i<_shardCount;i++){await Store.del(ak('trades_s'+i));delete _shardCache[i];}
  _shardCount=n;
  await Store.set(ak('trades_index'),JSON.stringify({v:2,shards:n,count:TRADES.length,size:SHARD_SIZE}));
}

/* ============================================================ MONTH / CALENDAR HELPERS */
function tradeDate(t){return t.exitAt||t.entryAt;}
function ymOf(iso){const p=bkkParts(new Date(iso));return p.year+'-'+p.month;}
function dayKeyOf(iso){const p=bkkParts(new Date(iso));return p.year+'-'+p.month+'-'+p.day;}
function outcome(t){if(t.status==='open')return'open';if(t.result==='win'||t.result==='loss'||t.result==='be')return t.result;if(t.pnl>0)return'win';if(t.pnl<0)return'loss';return'be';}
function symFor(pid){const p=PORTFOLIOS.find(x=>x.id===pid);return p?p.symbol:'$';}
function moneyFor(pid,n){const s=symFor(pid);return (n<0?'-':'')+s+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthLabel(key){const[y,m]=key.split('-');return MONTH_ABBR[+m-1]+' '+y;}
function weekKey(d=new Date()){const p=bkkParts(d);const dt=new Date(Date.UTC(+p.year,+p.month-1,+p.day));const dn=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-dn+3);const firstThu=new Date(Date.UTC(dt.getUTCFullYear(),0,4));const wk=1+Math.round(((dt-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);return 'W:'+dt.getUTCFullYear()+'-'+String(wk).padStart(2,'0');}
function weekLabel(d=new Date()){return 'Week '+weekKey(d).split('-')[1]+', '+bkkParts(d).year;}
function monthKeyP(d=new Date()){const p=bkkParts(d);return 'M:'+p.year+'-'+p.month;}
function monthLabelP(d=new Date()){const p=bkkParts(d);return MONTH_NAMES[+p.month-1]+' '+p.year;}
function monthsData(){
  const c=closed();const m={};
  for(const t of c){const k=ymOf(tradeDate(t));if(!m[k])m[k]={key:k,trades:[],net:0,wins:0,losses:0,be:0,r:0};
    const o=m[k];o.trades.push(t);o.net+=t.pnl||0;const oc=outcome(t);if(oc==='win')o.wins++;else if(oc==='loss')o.losses++;else o.be++;const r=calcR(t);if(r!=null)o.r+=r;}
  return Object.values(m).map(o=>({...o,total:o.trades.length,wr:(o.wins+o.losses)?o.wins/(o.wins+o.losses)*100:0,label:monthLabel(o.key)})).sort((a,b)=>a.key<b.key?1:-1);
}
function portfolioRows(){
  return PORTFOLIOS.map(p=>{const ts=TRADES.filter(t=>t.portfolioId===p.id&&t.status==='closed');
    const net=ts.reduce((s,t)=>s+(t.pnl||0),0);const wins=ts.filter(t=>outcome(t)==="win").length,losses=ts.filter(t=>outcome(t)==="loss").length;
    return{p,net,n:ts.length,wr:(wins+losses)?wins/(wins+losses)*100:0,equity:(+p.startBalance||0)+net};});
}

/* ============================================================ GROWTH CHARTS */
function monthlyBarsSVG(asc){
  const w=720,h=180,padX=12,padTop=20,padBot=30;
  if(!asc.length)return '<div class="skel">No monthly data yet.</div>';
  const vals=asc.map(m=>m.net),maxA=Math.max(1,...vals.map(Math.abs));
  const innerW=w-padX*2,innerH=h-padTop-padBot,zeroY=padTop+innerH/2,half=innerH/2;
  const n=asc.length,slot=innerW/n,bw=Math.min(46,slot*0.58);
  let bars='';
  asc.forEach((m,i)=>{const cx=padX+slot*i+slot/2,bh=Math.abs(m.net)/maxA*half;
    const y=m.net>=0?zeroY-bh:zeroY,col=m.net>=0?'var(--green)':'var(--red)';
    bars+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,bh).toFixed(1)}" rx="3" fill="${col}" opacity=".88"/>`;
    bars+=`<text x="${cx.toFixed(1)}" y="${h-11}" text-anchor="middle" font-size="10" fill="var(--faint)" font-family="var(--mono)">${m.label.split(' ')[0]}</text>`;
    bars+=`<text x="${cx.toFixed(1)}" y="${(m.net>=0?y-5:y+bh+12).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="${col}" font-family="var(--mono)">${(m.net>=0?'+':'')+Math.round(m.net)}</text>`;});
  return `<svg class="growth" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet"><line x1="${padX}" y1="${zeroY}" x2="${w-padX}" y2="${zeroY}" stroke="var(--line-2)"/>${bars}</svg>`;
}
function cumLineSVG(asc){
  const w=720,h=150,padX=12,padTop=16,padBot=26;
  if(!asc.length)return '<div class="skel">No monthly data yet.</div>';
  let cum=0;const data=[0];asc.forEach(m=>{cum+=m.net;data.push(cum);});
  const min=Math.min(...data),max=Math.max(...data),pad=(max-min)*0.12||1,lo=min-pad,hi=max+pad,span=hi-lo;
  const innerW=w-padX*2,innerH=h-padTop-padBot;
  const X=i=>padX+(data.length<=1?innerW/2:i/(data.length-1)*innerW),Y=v=>padTop+innerH-((v-lo)/span)*innerH;
  let d='M'+X(0)+' '+Y(data[0]);for(let i=1;i<data.length;i++)d+=' L'+X(i).toFixed(1)+' '+Y(data[i]).toFixed(1);
  const up=data[data.length-1]>=0,col=up?'var(--green)':'var(--red)',gid='cg'+Math.random().toString(36).slice(2,6);
  const base=Y(0),area=d+` L${X(data.length-1)} ${padTop+innerH} L${X(0)} ${padTop+innerH} Z`;
  return `<svg class="growth" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".2"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><line x1="${padX}" y1="${base.toFixed(1)}" x2="${w-padX}" y2="${base.toFixed(1)}" stroke="var(--line-2)" stroke-dasharray="3 4"/><path d="${area}" fill="url(#${gid})" stroke="none"/><path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/><circle cx="${X(data.length-1)}" cy="${Y(data[data.length-1]).toFixed(1)}" r="3.5" fill="${col}"/></svg>`;
}

      <div style="display:flex;gap:10px;align-items:center">

          <div class="exp-menu" id="exp-menu">

          </div>
